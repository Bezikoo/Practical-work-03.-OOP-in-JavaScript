<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Evil: Inventory</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- ЛІВА ПАНЕЛЬ: Каталог -->
        <section class="catalog-panel">
            <h2>Каталог предметів</h2>
            <div class="filter-controls">
                <input type="text" id="search-input" placeholder="Пошук предмета...">
                <select id="category-filter">
                    <option value="all">Усі категорії</option>
                    <option value="Weapon">Зброя</option>
                    <option value="Consumable">Витратні</option>
                    <option value="Quest">Квестові</option>
                    <option value="Resource">Ресурси</option>
                </select>
            </div>
            <div class="catalog-list" id="catalog-list">
                <!-- Items will be injected here -->
            </div>
        </section>

        <!-- ПРАВА ПАНЕЛЬ: Інвентар -->
        <section class="inventory-section">
            <div class="inventory-header">
                <div>
                    <h2>Стан інвентаря</h2>
                    <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">
                        Сітка: 10x8 | Зайнято: <span id="used-cells">0</span>/80
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="sort-btn" class="btn-secondary">Сортувати</button>
                    <button id="clear-btn" class="btn-danger">Очистити</button>
                </div>
            </div>

            <!-- СІТКА ІНВЕНТАРЯ -->
            <div class="grid-container">
                <div class="inventory-grid" id="inventory-grid">
                    <!-- Grid cells will be generated by JS -->
                </div>
            </div>

            <!-- ПАНЕЛЬ ДІЙ -->
            <div class="action-panel">
                <div class="item-info" id="item-info">
                    <span class="placeholder-text">Нічого не вибрано. Виберіть предмет в інвентарі.</span>
                </div>
                <div class="action-buttons">
                    <button id="craft-btn" class="btn-primary" disabled>Скрафтити</button>
                    <button id="delete-btn" class="btn-danger" disabled>Видалити</button>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
